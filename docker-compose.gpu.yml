# GPU 版本（需要安装 nvidia-docker）
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend.gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
